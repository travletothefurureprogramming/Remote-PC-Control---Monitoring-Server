<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote PC Control & Monitoring</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        body{
            background:#f8f9fa;
        }

        .card{
            border:none;
            border-radius:15px;
            box-shadow:0 2px 10px rgba(0,0,0,.1);
            background:white;
        }


        .progress{
            height:25px;
        }

        .progress-bar{
            transition:0.5s;
        }

        .value{
            font-size:2rem;
            font-weight:bold;
            margin-top:10px;
        }

        .power-btn{
            height:60px;
            font-size:1.1rem;
        }

    </style>
</head>

<body>

<div class="container py-4">

    <h1 class="text-center mb-5">
        <i class="bi bi-pc-display"></i>
        Remote PC Control & Monitoring
    </h1>

    <!-- System Cards -->

    <div class="row g-4">

        <div class="col-lg-3 col-md-6">
            <div class="card">
                <div class="card-body">

                    <h5>
                        <i class="bi bi-cpu"></i>
                        CPU
                    </h5>

                    <div class="progress mt-3">
                        <div id="cpu-bar"
                             class="progress-bar bg-primary"
                             style="width:0%">
                        </div>
                    </div>

                    <div class="value" id="cpu">0%</div>

                </div>
            </div>
        </div>

        <div class="col-lg-3 col-md-6">
            <div class="card">
                <div class="card-body">

                    <h5>
                        <i class="bi bi-memory"></i>
                        RAM
                    </h5>

                    <div class="progress mt-3">
                        <div id="ram-bar"
                             class="progress-bar bg-success"
                             style="width:0%">
                        </div>
                    </div>

                    <div class="value" id="ram">0%</div>

                </div>
            </div>
        </div>

        <div class="col-lg-3 col-md-6">
            <div class="card">
                <div class="card-body">

                    <h5>
                        <i class="bi bi-hdd"></i>
                        Disk
                    </h5>

                    <div class="progress mt-3">
                        <div id="disk-bar"
                             class="progress-bar bg-warning"
                             style="width:0%">
                        </div>
                    </div>

                    <div class="value" id="disk">0%</div>

                </div>
            </div>
        </div>

        <div class="col-lg-3 col-md-6">
            <div class="card">
                <div class="card-body">

                    <h5>
                        <i class="bi bi-battery-half"></i>
                        Battery
                    </h5>

                    <div class="progress mt-3">
                        <div id="battery-bar"
                             class="progress-bar bg-info"
                             style="width:0%">
                        </div>
                    </div>

                    <div class="value" id="battery">N/A</div>

                </div>
            </div>
        </div>

    </div>

    <!-- Network + Volume -->

    <div class="row g-4 mt-1">

        <div class="col-lg-6">

            <div class="card h-100">

                <div class="card-body">

                    <h5>
                        <i class="bi bi-wifi"></i>
                        Network
                    </h5>

                    <hr>

                    <p class="fs-5">
                        ⬆ Upload:
                        <span id="net_sent">0 B/s</span>
                    </p>

                    <p class="fs-5">
                        ⬇ Download:
                        <span id="net_recv">0 B/s</span>
                    </p>

                </div>

            </div>

        </div>

        <div class="col-lg-6">

            <div class="card h-100">

                <div class="card-body">

                    <h5>
                        <i class="bi bi-volume-up"></i>
                        Volume
                    </h5>

                    <hr>

                    <div class="value mb-3" id="volume">
                        0%
                    </div>

                    <button class="btn btn-success w-100 mb-2"
                            onclick="increase_volume()">
                        Increase Volume
                    </button>

                    <button class="btn btn-danger w-100"
                            onclick="decrease_volume()">
                        Decrease Volume
                    </button>

                </div>

            </div>

        </div>

    </div>

    <!-- Power Controls -->

    <div class="card mt-4">

        <div class="card-body">

            <h5>
                <i class="bi bi-power"></i>
                Power Controls
            </h5>

            <hr>

            <div class="row g-3">

                <div class="col-md-4">

                    <button
                        class="btn btn-danger w-100 power-btn"
                        onclick="shutdown_pc()">

                        <i class="bi bi-power"></i>
                        Shutdown

                    </button>

                </div>

                <div class="col-md-4">

                    <button
                        class="btn btn-warning w-100 power-btn"
                        onclick="restart_pc()">

                        <i class="bi bi-arrow-clockwise"></i>
                        Restart

                    </button>

                </div>

                <div class="col-md-4">

                    <button
                        class="btn btn-info w-100 power-btn"
                        onclick="sleep_pc()">

                        <i class="bi bi-moon"></i>
                        Sleep

                    </button>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

const SERVER = window.location.origin;

function updateSystemInfo(){

    fetch(`${SERVER}/api/system`)
    .then(response => response.json())
    .then(data => {

        document.getElementById("cpu").innerHTML =
            data.cpu + "%";

        document.getElementById("ram").innerHTML =
            data.ram + "%";

        document.getElementById("disk").innerHTML =
            data.disk + "%";

        document.getElementById("volume").innerHTML =
            data.volume + "%";

        document.getElementById("net_sent").innerHTML =
            data.net_sent + " B/s";

        document.getElementById("net_recv").innerHTML =
            data.net_recv + " B/s";

        document.getElementById("cpu-bar").style.width =
            data.cpu + "%";

        document.getElementById("ram-bar").style.width =
            data.ram + "%";

        document.getElementById("disk-bar").style.width =
            data.disk + "%";

        if(data.battery !== "N/A"){

            document.getElementById("battery").innerHTML =
                data.battery + "%";

            document.getElementById("battery-bar").style.width =
                data.battery + "%";
        }

    });

}

function shutdown_pc(){

    fetch(`${SERVER}/api/actions/shutdown`,{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            action:"shutdown"
        })
    });

}

function restart_pc(){

    fetch(`${SERVER}/api/actions/restart`,{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            action:"restart"
        })
    });

}

function sleep_pc(){

    fetch(`${SERVER}/api/actions/sleep`,{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            action:"sleep"
        })
    });

}

function increase_volume(){

    fetch(`${SERVER}/api/actions/volume`,{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            action:"increase"
        })
    });

}

function decrease_volume(){

    fetch(`${SERVER}/api/actions/volume`,{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            action:"decrease"
        })
    });

}

setInterval(updateSystemInfo,1000);

updateSystemInfo();

</script>

</body>
</html>
