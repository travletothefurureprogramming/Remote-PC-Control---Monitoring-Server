<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REMOTE PC CONTROL & MONITORING SYSTEM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">

        <h1 class="text-center fw-bold mb-5">
            REMOTE PC CONTROL & MONITORING SYSTEM
        </h1>

        <div class="row g-4">

            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title fw-bold">CPU Usage</h5>
                        <p class="card-text fs-3" id="cpu">Loading...</p>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title fw-bold">RAM Usage</h5>
                        <p class="card-text fs-3" id="ram">Loading...</p>
                    </div>
                </div>
            </div>

            <div class="col-md-6"> 
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title fw-bold">Disk Usage</h5>
                        <p class="card-text fs-3" id="disk">Loading...</p>
                    </div>
                </div>
            </div>


        </div>

    </div>

    <script>
        function updateSystemInfo() {
            fetch('http://192.168.1.10:8080/api/system')
            .then(response => response.json())
            .then(data => {
                document.getElementById("cpu").innerHTML = data.cpu + "%";
                document.getElementById("ram").innerHTML = data.ram + "%";
                document.getElementById("disk").innerHTML = data.disk + "%";
            })
            .catch(error => console.error('Error:', error));
        }

        setInterval(updateSystemInfo, 1000);
        updateSystemInfo();
    </script>

</body>
</html>
