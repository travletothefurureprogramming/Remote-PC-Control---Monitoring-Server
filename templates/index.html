<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REMOTE PC CONTROL & MONITORING SYSTEM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">

        <h1 class="text-center fw-bold mb-5">
            REMOTE PC CONTROL & MONITORING SYSTEM
        </h1>

        <div class="row g-4">

            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title fw-bold">CPU Usage</h5>
                        <p class="card-text fs-3" id="cpu">Loading...</p>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title fw-bold">RAM Usage</h5>
                        <p class="card-text fs-3" id="ram">Loading...</p>
                    </div>
                </div>
            </div>

            <div class="col-md-6"> 
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title fw-bold">Disk Usage</h5>
                        <p class="card-text fs-3" id="disk">Loading...</p>
                    </div>
                </div>
            </div>

            <div class="col-md-6"> 
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title fw-bold">Network Usage</h5>
                        <p class="card-text fs-3" id="net_sent">Loading...</p>
                        <p class="card-text fs-3" id="net_recv">Loading...</p>
                    </div>
                </div>
            </div>

            <div class="col-md-6"> 
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title fw-bold">Power Controls</h5>

                        <div class="card-text fs-3">

                            <button class="btn btn-primary btn-lg w-100 mt-4" onclick="sleep_pc()">
                                Put PC to Sleep
                            </button>

                        </div>

                    </div>
                </div>
            </div>

            <div class="col-md-6"> 
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title fw-bold">Volume</h5>
                        
                        <div class="card-text fs-3">

                            <p id="volume">
                                Loading.....
                            </p>

                            <button class="btn btn-primary btn-lg w-100 mt-4" onclick="increase_volume()">
                                Increase Volume
                            </button>

                            <button class="btn btn-primary btn-lg w-100 mt-4" onclick="decrease_volume()">
                                Decrease Volume
                            </button>

                        </div>

                    </div>
                </div>
            </div>

        </div>

    </div>

    <script>
        function updateSystemInfo() {
            fetch('http://192.168.1.10:8080/api/system')
            .then(response => response.json())
            .then(data => {
                document.getElementById("cpu").innerHTML = data.cpu + "%";
                document.getElementById("ram").innerHTML = data.ram + "%";
                document.getElementById("disk").innerHTML = data.disk + "%";
                document.getElementById("net_sent").innerHTML = data.net_sent + " Sent bps";
                document.getElementById("net_recv").innerHTML = data.net_recv + " Recv bps";
                document.getElementById("volume").innerHTML = data.volume + "%"
            })
            .catch(error => console.error('Error:', error));
        }

        function sleep_pc(){
            fetch("http://192.168.1.10:8080/api/actions/sleep", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ action: "sleep" })
            });

        }

        function increase_volume() {
            fetch("http://192.168.1.10:8080/api/actions/volume", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ action: "increase" })
            });

        }

        function decrease_volume() {
            fetch("http://192.168.1.10:8080/api/actions/volume", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ action: "decrease" })
            });

        }

        setInterval(updateSystemInfo, 1000);
        updateSystemInfo();
    </script>

</body>
</html>
